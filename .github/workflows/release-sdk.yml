name: release-sdk

on:
  push:
    tags:
      - "agent-search-sdk-v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to validate/publish (for example agent-search-sdk-v1.0.3)"
        required: false
        type: string
        default: ""
      publish:
        description: "Publish to PyPI"
        required: false
        type: boolean
        default: false

jobs:
  build_and_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install release tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build and validate SDK artifacts
        env:
          RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
        run: ./scripts/release_sdk.sh

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-search-sdk-dist
          path: sdk/core/dist/*
          if-no-files-found: error
